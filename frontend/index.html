<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI Dev Assistant</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
        font-family: Inter, system-ui, sans-serif;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 32px;
      }
      .card {
        max-width: 680px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.32);
      }
      h1 {
        margin-top: 0;
        color: #f8fafc;
      }
      p {
        line-height: 1.8;
        color: #cbd5e1;
      }
      a {
        color: #7dd3fc;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>GenAI Dev Assistant</h1>
      <p>This project is a Python Streamlit application and cannot run directly on Netlify.</p>
      <p>To deploy this app continuously, use a Python-friendly service such as:</p>
      <ul>
        <li><a href="https://streamlit.io/cloud" target="_blank">Streamlit Community Cloud</a></li>
        <li><a href="https://render.com" target="_blank">Render</a></li>
        <li><a href="https://railway.app" target="_blank">Railway</a></li>
      </ul>
      <p>See <strong>DEPLOYMENT.md</strong> for full instructions.</p>
    </div>
  </body>
</html>
